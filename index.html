<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D4YOU - Gestão Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple: #8b5cf6;
            --purple-dark: #6d28d9;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h1 { text-align: center; color: var(--purple); margin-bottom: 25px; }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; opacity: 0.9; }
        
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }

        .result-card {
            background: linear-gradient(135deg, #4c1d95, #8b5cf6);
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            text-align: center;
        }

        .price-tag { font-size: 24px; font-weight: bold; margin: 10px 0; }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: none;
            background: var(--purple);
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }

        button:hover { background: var(--purple-dark); }

        .manual-box {
            background: rgba(139, 92, 246, 0.1);
            border: 1px dashed var(--purple);
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
        }

        .history-item {
            background: #334155;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>3D4YOU 🚀</h1>

    <div class="input-group">
        <label>Nome da Peça</label>
        <input type="text" id="nomePeca" placeholder="Ex: Batman Articulado">
    </div>

    <div class="input-group">
        <label>Peso da Peça (gramas)</label>
        <input type="number" id="pesoGrama" oninput="calcular()">
    </div>

    <div class="input-group">
        <label>Tempo de Impressão (horas)</label>
        <input type="number" id="tempoHora" oninput="calcular()">
    </div>

    <div class="result-card">
        <div>Sugestão de Venda (Meli/Shopee):</div>
        <div class="price-tag" id="precoSugerido">R$ 0,00</div>
        <small id="custoProducao">Custo: R$ 0,00</small>
    </div>

    <div class="input-group" style="margin-top: 20px;">
        <label style="color: #a78bfa;">Como você vendeu?</label>
        <select id="tipoVenda" onchange="toggleManual()">
            <option value="Direta">Venda Direta (PIX/Dinheiro)</option>
            <option value="Shopee">Pela Shopee</option>
            <option value="Meli">Pelo Mercado Livre</option>
            <option value="Manual">💰 Valor da minha cabeça</option>
        </select>
    </div>

    <div id="boxManual" class="manual-box">
        <div class="input-group">
            <label>Qual valor você cobrou? (R$)</label>
            <input type="number" step="0.01" id="valorVendaManual" placeholder="Ex: 99.98">
        </div>
        <div class="input-group">
            <label>Qual foi o canal dessa venda?</label>
            <select id="canalManual">
                <option value="Direta">Direta</option>
                <option value="Shopee">Shopee</option>
                <option value="Meli">Mercado Livre</option>
            </select>
        </div>
    </div>

    <button onclick="salvarVenda()">Salvar Venda no Firebase</button>

    <h3 style="margin-top: 30px;">Últimas Vendas</h3>
    <div id="listaVendas"></div>
</div>

<script>
    // CONFIGURAÇÃO DO SEU FIREBASE (Extraída da sua foto!)
    const firebaseConfig = {
        apiKey: "AIzaSyAs-vG4eY_Iclt5UoP8_B0h-5k7Gz077mU",
        authDomain: "calculadora-3d-862d3.firebaseapp.com",
        projectId: "calculadora-3d-862d3",
        storageBucket: "calculadora-3d-862d3.appspot.com",
        messagingSenderId: "1098616110300",
        appId: "1:1098616110300:web:485e925b414441e86055d7"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const PRECO_FILAMENTO_KG = 100; 
    const CUSTO_HORA_MAQUINA = 2.50; 
    const MARGEM_LUCRO = 2.0; 
    const TAXA_MARKETPLACE = 0.20; 

    let totalSugerido = 0;
    let custoBase = 0;

    function calcular() {
        const peso = document.getElementById('pesoGrama').value || 0;
        const horas = document.getElementById('tempoHora').value || 0;
        custoBase = (peso * (PRECO_FILAMENTO_KG / 1000)) + (horas * CUSTO_HORA_MAQUINA);
        totalSugerido = (custoBase * MARGEM_LUCRO) / (1 - TAXA_MARKETPLACE);
        document.getElementById('precoSugerido').innerText = `R$ ${totalSugerido.toFixed(2)}`;
        document.getElementById('custoProducao').innerText = `Custo: R$ ${custoBase.toFixed(2)}`;
    }

    function toggleManual() {
        const tipo = document.getElementById('tipoVenda').value;
        document.getElementById('boxManual').style.display = (tipo === 'Manual') ? 'block' : 'none';
    }

    async function salvarVenda() {
        const nome = document.getElementById('nomePeca').value;
        const tipo = document.getElementById('tipoVenda').value;
        let valorFinal, canalFinal;

        if (tipo === 'Manual') {
            valorFinal = parseFloat(document.getElementById('valorVendaManual').value);
            canalFinal = document.getElementById('canalManual').value;
        } else {
            valorFinal = (tipo === 'Direta') ? (custoBase * MARGEM_LUCRO) : totalSugerido;
            canalFinal = tipo;
        }

        if (!nome || isNaN(valorFinal)) return alert("Preencha o nome e o valor!");

        try {
            await db.collection("vendas_3d").add({
                nome: nome,
                valorCobrado: valorFinal,
                canal: canalFinal,
                custo: custoBase,
                lucroLimpo: (canalFinal === 'Direta') ? (valorFinal - custoBase) : (valorFinal * (1 - TAXA_MARKETPLACE)) - custoBase,
                data: new Date().toISOString()
            });
            alert("Venda registrada com sucesso!");
            location.reload(); 
        } catch (e) {
            console.error(e);
            alert("Erro ao salvar! Verifique as regras do Firebase.");
        }
    }

    // Carregar histórico
    db.collection("vendas_3d").orderBy("data", "desc").limit(5).get().then((querySnapshot) => {
        const lista = document.getElementById('listaVendas');
        querySnapshot.forEach((doc) => {
            const v = doc.data();
            lista.innerHTML += `
                <div class="history-item">
                    <strong>${v.nome}</strong><br>
                    R$ ${v.valorCobrado.toFixed(2)} (${v.canal})<br>
                    <span style="color: #4ade80">Lucro: R$ ${v.lucroLimpo.toFixed(2)}</span>
                </div>
            `;
        });
    });
</script>

</body>
</html>
