<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon"
          href="https://via.placeholder.com/192/3b82f6/FFFFFF?text=3D+4You">

    <title>3D 4You ERP</title>

    <!-- libs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-color: #0f172a; 
            --card-bg: #1e293b; 
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.15);
            --success: #10b981;
            --shopee: #f94d30;
            --meli: #facc15;
            --sky: #0ea5e9;
            --purple: #8b5cf6;
            --orange: #f97316;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, system-ui, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 15px;
        }

        header {
            text-align: center;
            margin-bottom: 12px;
            flex-shrink: 0;
            position: relative;
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #3b82f6, #9333ea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            margin: 0;
        }

        .nuvem-icon {
            font-size: 0.8rem;
            margin-left: 5px;
            vertical-align: super;
            color: var(--success);
        }

        .dashboard {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            overflow-y: auto;
            padding-bottom: 20px;
            max-width: 100%;
        }

        .col {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 100%;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            max-width: 100%;
        }

        .card-disabled {
            opacity: 0.3;
            pointer-events: none;
            filter: grayscale(1);
        }

        .section-title {
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--sky);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            padding-bottom: 6px;
            text-transform: uppercase;
        }

        .grid-2,
        .grid-3 {
            display: grid;
            gap: 10px;
        }

        .grid-2 {
            grid-template-columns: 1fr 1fr;
        }

        .grid-3 {
            grid-template-columns: repeat(3, 1fr);
        }

        @media (max-width: 600px) {
            .grid-2,
            .grid-3 {
                grid-template-columns: 1fr;
            }
        }

        .input-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 8px;
        }

        .input-group label {
            font-size: 0.65rem;
            font-weight: 700;
            margin-bottom: 4px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .input-group input,
        .input-group select {
            background: #0f172a;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-main);
            outline: none;
            width: 100%;
            max-width: 100%;
        }

        .input-group input[readonly] {
            background: #0a0f1d;
            color: #94a3b8;
            cursor: not-allowed;
            border-color: #1e293b;
        }

        .peso-destaque {
            border: 2px solid var(--sky) !important;
            background: rgba(14, 165, 233, 0.1) !important;
            font-size: 1.1rem !important;
            color: #fff !important;
        }

        .filament-box {
            background: rgba(0,0,0,0.15);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .filament-box-title {
            font-size: 0.7rem;
            color: var(--sky);
            font-weight: 800;
            margin-bottom: 10px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .detalhes-material {
            display: none;
            margin-top: 10px;
            border-top: 1px dashed var(--border);
            padding-top: 10px;
        }

        .range-area {
            margin-top: 15px;
            background: rgba(15, 23, 42, 0.4);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .range-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        input[type="range"] {
            flex: 1;
            height: 10px;
            background: #334155;
            border-radius: 8px;
            appearance: none;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #fff;
            border: 3px solid var(--primary);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        .margem-box {
            display: flex;
            align-items: center;
            background: #0f172a;
            border: 2px solid var(--primary);
            border-radius: 10px;
            padding: 0 12px;
            min-width: 120px;
            height: 45px;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.1);
        }

        .margem-box input {
            width: 100%;
            font-size: 1.3rem;
            font-weight: 900;
            color: var(--primary);
            text-align: right;
            background: transparent;
            border: none;
            outline: none;
        }

        .margem-box span {
            color: var(--primary);
            font-weight: 900;
            font-size: 1.1rem;
            margin-left: 2px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 34px;
            height: 20px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider-switch {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #334155;
            transition: .4s;
            border-radius: 20px;
        }

        .slider-switch:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider-switch {
            background-color: var(--primary);
        }

        input:checked + .slider-switch:before {
            transform: translateX(14px);
        }

        #toggle_catalogo:checked + .slider-switch { background-color: var(--orange); }
        #toggle_estoque:checked + .slider-switch { background-color: var(--success); }
        #toggle_multi_mat:checked + .slider-switch { background-color: var(--purple); }
        #toggle_marketplaces:checked + .slider-switch { background-color: var(--primary); }
        #toggle_simulador:checked + .slider-switch { background-color: var(--sky); }
        #toggle_despesas:checked + .slider-switch { background-color: var(--danger); }
        #toggle_logistica:checked + .slider-switch { background-color: var(--primary); }

        .results {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 18px;
            border: 1px solid var(--primary);
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 100%;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            font-size: 0.8rem;
            border-bottom: 1px dashed rgba(255,255,255,0.05);
            gap: 10px;
        }

        .result-row span:first-child {
            flex: 1;
            line-height: 1.2;
        }

        .result-row .value {
            font-family: monospace;
            font-weight: 600;
            color: var(--text-main);
            font-size: 0.9rem;
            white-space: nowrap;
            text-align: right;
        }

        .price-box {
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            border-left: 4px solid transparent;
            background: rgba(0,0,0,0.2);
            position: relative;
            max-width: 100%;
        }

        .price-box .total {
            font-size: 1.7rem;
            font-weight: 900;
        }

        .price-box.direta {
            border-color: var(--success);
            color: #34d399;
        }

        .price-box.shopee {
            border-color: var(--shopee);
            color: #ff8b73;
        }

        .price-box.meli {
            border-color: var(--meli);
            color: var(--meli);
        }

        .lucro-tag {
            font-size: 0.65rem;
            color: #10b981;
            font-weight: 700;
            margin-top: 4px;
            background: rgba(16, 185, 129, 0.1);
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .share-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 5px;
        }

        .btn {
            padding: 14px 5px;
            border: none;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 800;
            color: white;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
            width: 100%;
            max-width: 100%;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-direta { background: var(--success); }
        .btn-shopee { background: var(--shopee); }
        .btn-meli { background: #ca8a04; }
        .btn-all { background: var(--sky); }
        .btn-orcamento { background: #4f46e5; }

        .btn-reset {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 12px;
            font-weight: 700;
            border-radius: 12px;
            margin-top: 10px;
            cursor: pointer;
            width: 100%;
        }

        #toast {
            visibility: hidden;
            background: var(--primary);
            color: white;
            padding: 12px 24px;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 30px;
            font-weight: 700;
            z-index: 1000;
        }

        #toast.show {
            visibility: visible;
            animation: fadein 0.5s;
        }

        .btn-save-hist {
            background: var(--purple);
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            color: white;
            border: none;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 5px;
        }

        .filter-container {
            display: flex;
            overflow-x: auto;
            gap: 8px;
            margin-bottom: 12px;
            padding-bottom: 5px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .filter-container::-webkit-scrollbar {
            display: none;
        }

        .filter-btn {
            flex-shrink: 0;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 800;
            cursor: pointer;
            white-space: nowrap;
            border: 1px solid var(--border);
            background: #0f172a;
            color: var(--text-muted);
            transition: 0.2s;
            outline: none;
            text-transform: uppercase;
        }

        .filter-btn:active {
            transform: scale(0.95);
        }

        .filter-btn.active {
            border-color: var(--sky);
            color: #fff;
            background: rgba(14, 165, 233, 0.15);
            box-shadow: 0 0 10px rgba(14, 165, 233, 0.2);
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 350px;
            overflow-y: auto;
        }

        .history-item {
            background: #0f172a;
            border-radius: 12px;
            padding: 12px;
            border: 1px solid var(--border);
            position: relative;
        }

        .history-item h4 {
            font-size: 0.85rem;
            color: var(--purple);
            margin-bottom: 5px;
        }

        .history-item .hist-vals {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .history-item .hist-vals b {
            color: var(--text-main);
        }

        .btn-del-item {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #ef4444;
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            line-height: 1;
        }

        .btn-edit-item {
            position: absolute;
            top: 10px;
            right: 35px;
            color: var(--sky);
            background: none;
            border: none;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .status-select {
            font-size: 0.6rem;
            font-weight: 800;
            border-radius: 6px;
            padding: 3px 6px;
            border: none;
            outline: none;
            cursor: pointer;
            appearance: none;
            text-align: center;
            text-transform: uppercase;
        }

        .status-orcamento {
            background: rgba(234, 179, 8, 0.15);
            color: #eab308;
            border: 1px solid rgba(234, 179, 8, 0.4);
        }

        .status-fila {
            background: rgba(59, 130, 246, 0.15);
            color: #3b82f6;
            border: 1px solid rgba(59, 130, 246, 0.4);
        }

        .status-imprimindo {
            background: rgba(168, 85, 247, 0.15);
            color: #a855f7;
            border: 1px solid rgba(168, 85, 247, 0.4);
        }

        .status-finalizado {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.4);
        }

        .status-enviado {
            background: rgba(14, 165, 233, 0.15);
            color: var(--sky);
            border: 1px solid rgba(14, 165, 233, 0.4);
        }

        .total-summary {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid var(--primary);
            border-radius: 12px;
            padding: 12px;
            margin-top: 10px;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            margin-bottom: 5px;
            gap: 10px;
        }

        .total-row span:first-child {
            flex: 1;
            line-height: 1.2;
        }

        .total-row b {
            color: var(--sky);
            font-family: monospace;
            font-size: 0.85rem;
            white-space: nowrap;
            text-align: right;
        }

        .report-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
        }

        .btn-report {
            background: #334155;
            color: white;
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.65rem;
            width: 100%;
        }

        .btn-import {
            background: transparent;
            color: var(--sky);
            border: 1px dashed var(--sky);
            width: 100%;
            padding: 10px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.6rem;
            margin-top: 8px;
        }

        @media (min-width: 1024px) {
            .dashboard {
                grid-template-columns: 1.2fr 1.2fr minmax(260px, 0.9fr);
                overflow-y: hidden;
            }

            .col {
                overflow-y: auto;
                height: 100%;
                padding-right: 5px;
            }
        }
    </style>
</head>
<body>

    <div>
        <h1>3D 4You</h1>
        <span class="nuvem-icon" title="Nuvem Online">☁️</span>
    </div>
    <p style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;">

    </p>
</header>
